services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_URL: "http://localhost:8180"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/budget/.well-known/openid-configuration HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q 'issuer' <&3"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  budget:
    build: .
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Budget__DatabasePath: Data/budget.db
      Budget__StatementInboxPath: Data/Statements/Inbox
      Budget__StatementProcessedPath: Data/Statements/Processed
      Keycloak__Authority: http://keycloak:8080/realms/budget
      Keycloak__ClientId: budget-web
      Keycloak__ClientSecret: ${KEYCLOAK_CLIENT_SECRET:-budget-web-secret-change-me}
      Keycloak__AdminUsername: admin
      Keycloak__AdminPassword: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./Data:/app/Data
    depends_on:
      keycloak:
        condition: service_healthy

